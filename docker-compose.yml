services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
